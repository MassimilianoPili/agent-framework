name: Branch Cascade

on:
  push:
    branches: [main]

permissions:
  contents: write

# Cascades changes from main → develop → test
# following the vertical-horizontal branching strategy.
# Creates branches from main if they don't exist yet.

jobs:
  cascade-to-develop:
    name: Cascade main → develop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse --verify origin/develop >/dev/null 2>&1; then
            git checkout develop
            git merge origin/main --no-edit || {
              echo "::warning::Merge conflict main → develop. Manual resolution required."
              exit 1
            }
          else
            echo "Branch 'develop' does not exist. Creating from main."
            git checkout -b develop
          fi

          git push origin develop

  cascade-to-test:
    name: Cascade develop → test
    runs-on: ubuntu-latest
    needs: cascade-to-develop
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge develop into test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Fetch latest (develop was just updated)
          git fetch origin

          if git rev-parse --verify origin/test >/dev/null 2>&1; then
            git checkout test
            git merge origin/develop --no-edit || {
              echo "::warning::Merge conflict develop → test. Manual resolution required."
              exit 1
            }
          else
            echo "Branch 'test' does not exist. Creating from develop."
            git checkout -b test origin/develop
          fi

          git push origin test
