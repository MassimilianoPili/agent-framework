name: Build Container Images

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agent-framework

jobs:
  build-orchestrator:
    name: Build Orchestrator Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn clean package -B -q -DskipTests -pl control-plane/orchestrator -am

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: control-plane/orchestrator
          file: control-plane/orchestrator/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/orchestrator:latest
            ${{ env.IMAGE_PREFIX }}/orchestrator:${{ github.sha }}

  build-workers:
    name: Build ${{ matrix.worker }} Image
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [be-worker, fe-worker, ai-task-worker, contract-worker, review-worker]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: mvn clean package -B -q -DskipTests -pl execution-plane/workers/${{ matrix.worker }} -am

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: execution-plane/workers/${{ matrix.worker }}
          file: execution-plane/workers/${{ matrix.worker }}/docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.worker }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.worker }}:${{ github.sha }}
