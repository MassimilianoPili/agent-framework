name: Deploy to Collaudo

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true

env:
  AZURE_RESOURCE_GROUP: rg-agent-framework-collaudo
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/agent-framework

jobs:
  deploy:
    name: Deploy to Collaudo (UAT)
    runs-on: ubuntu-latest
    environment: collaudo
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Orchestrator
        run: |
          echo "Deploying orchestrator to ${{ env.AZURE_RESOURCE_GROUP }}"
          # az containerapp update --name orchestrator --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
          #   --image ${{ env.IMAGE_PREFIX }}/orchestrator:${{ inputs.image_tag }}

      - name: Deploy Workers
        run: |
          for worker in be-java-worker fe-react-worker ai-task-worker contract-worker review-worker \
                       task-manager-worker compensator-manager-worker context-manager-worker \
                       event-manager-worker hook-manager-worker schema-manager-worker \
                       audit-manager-worker rag-manager-worker advisory-worker \
                       dba-postgres-worker mobile-swift-worker sdk-scaffold-worker; do
            echo "Deploying $worker to ${{ env.AZURE_RESOURCE_GROUP }}"
            # az containerapp job update --name $worker --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            #   --image ${{ env.IMAGE_PREFIX }}/$worker:${{ inputs.image_tag }}
          done
