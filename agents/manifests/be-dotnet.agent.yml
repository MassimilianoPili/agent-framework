apiVersion: agent-framework/v1
kind: AgentManifest
metadata:
  name: be-dotnet-worker
  displayName: "Backend .NET Worker (C#)"
  description: >
    Handles C#/.NET backend tasks — ASP.NET Core controllers or minimal APIs, Entity Framework Core, dependency injection, and xUnit tests.

spec:
  workerType: BE
  workerProfile: be-dotnet
  topic: agent-tasks
  subscription: be-dotnet-worker-sub
  model:
    name: claude-sonnet-4-6
    maxTokens: 16384
    temperature: 0.2
  prompts:
    systemPromptFile: .claude/agents/be-dotnet/SKILL.md
    skills:
      - skills/dotnet-workflow-skills/
      - skills/crosscutting/
    instructions: |
      Implement the backend task described above using C# and ASP.NET Core.
      Use the available filesystem tools to read existing code,
      understand the project structure, and write the implementation.
    resultSchema: |
      {
        "files_created": ["list of new files created"],
        "files_modified": ["list of existing files modified"],
        "git_commit": "suggested commit message",
        "summary": "brief description of what was implemented",
        "test_results": "description of tests written and their status"
      }
  tools:
    dependencies:
      - io.github.massimilianopili:mcp-devops-tools
      - io.github.massimilianopili:mcp-filesystem-tools
      - io.github.massimilianopili:mcp-bash-tool
    allowlist:
      - fs_list
      - fs_read
      - fs_write
      - fs_search
      - fs_grep
      - bash_execute
    mcpServers:
      - git
      - repo-fs
      - openapi
      - test
      - bash
  ownership:
    ownsPaths:
      - backend/
      - templates/be/
    readOnlyPaths: []
  concurrency:
    maxConcurrentCalls: 3
