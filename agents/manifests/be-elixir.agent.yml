apiVersion: agent-framework/v1
kind: AgentManifest

metadata:
  name: be-elixir-worker
  displayName: "Backend Elixir Worker (Phoenix)"
  description: >
    Handles Elixir/Phoenix backend tasks — controllers, contexts, Ecto schemas,
    migrations, LiveView, GenServer, and ExUnit tests.

spec:
  workerType: BE
  workerProfile: be-elixir
  topic: agent-tasks
  subscription: be-elixir-worker-sub

  model:
    name: claude-sonnet-4-6
    maxTokens: 16384
    temperature: 0.2

  prompts:
    systemPromptFile: .claude/agents/be-elixir/SKILL.md
    skills:
      - skills/elixir-workflow-skills/
      - skills/crosscutting/
    instructions: |
      Implement the backend task described above using Elixir and Phoenix.
      Use the available filesystem tools to read existing code,
      understand the project structure, and write the implementation.
    resultSchema: |
      {
        "files_created": ["list of new files created"],
        "files_modified": ["list of existing files modified"],
        "git_commit": "suggested commit message",
        "summary": "brief description of what was implemented",
        "test_results": "description of tests written and their status"
      }

  tools:
    dependencies:
      - io.github.massimilianopili:mcp-devops-tools
      - io.github.massimilianopili:mcp-filesystem-tools
    allowlist:
      - fs_list
      - fs_read
      - fs_write
      - fs_search
      - fs_grep
    mcpServers:
      - git
      - repo-fs
      - openapi
      - test

  ownership:
    ownsPaths:
      - backend/
      - templates/be/
    readOnlyPaths: []

  concurrency:
    maxConcurrentCalls: 3
