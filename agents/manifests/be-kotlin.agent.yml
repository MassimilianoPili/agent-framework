apiVersion: agent-framework/v1
kind: AgentManifest

metadata:
  name: be-kotlin-worker
  displayName: "Backend Kotlin Worker (Spring Boot)"
  description: >
    Handles Kotlin/Spring Boot backend tasks — controllers, services,
    repositories, coroutines, data classes, and unit/slice tests.

spec:
  workerType: BE
  workerProfile: be-kotlin
  topic: agent-tasks
  subscription: be-kotlin-worker-sub

  model:
    name: claude-sonnet-4-6
    maxTokens: 16384
    temperature: 0.2

  prompts:
    systemPromptFile: .claude/agents/be-kotlin/SKILL.md
    skills:
      - skills/kotlin-workflow-skills/
      - skills/crosscutting/
    instructions: |
      Implement the backend task described above using Kotlin and Spring Boot.
      Use the available filesystem and database tools to read existing code,
      understand the project structure, and write the implementation.
    resultSchema: |
      {
        "files_created": ["list of new files created"],
        "files_modified": ["list of existing files modified"],
        "git_commit": "suggested commit message",
        "summary": "brief description of what was implemented",
        "test_results": "description of tests written and their status"
      }

  tools:
    dependencies:
      - io.github.massimilianopili:mcp-devops-tools
      - io.github.massimilianopili:mcp-filesystem-tools
      - io.github.massimilianopili:mcp-sql-tools
    allowlist:
      - fs_list
      - fs_read
      - fs_write
      - fs_search
      - fs_grep
    mcpServers:
      - git
      - repo-fs
      - openapi
      - test

  ownership:
    ownsPaths:
      - backend/
      - templates/be/
    readOnlyPaths: []

  concurrency:
    maxConcurrentCalls: 3
