apiVersion: agent-framework/v1
kind: AgentManifest

metadata:
  name: be-node-worker
  displayName: "Backend Node.js Worker"
  description: >
    Handles Node.js/TypeScript backend tasks — Express/NestJS/Fastify
    services, database access, and tests.

spec:
  workerType: BE
  workerProfile: be-node
  topic: agent-tasks
  subscription: be-node-worker-sub

  model:
    name: claude-sonnet-4-6
    maxTokens: 16384
    temperature: 0.2

  prompts:
    systemPromptFile: .claude/agents/be-node/SKILL.md
    skills:
      - skills/node-workflow-skills/
      - skills/crosscutting/
    instructions: |
      Implement the backend task described above using Node.js/TypeScript.
      Use the available filesystem tools to read existing code,
      understand the project structure, and write the implementation.
    resultSchema: |
      {
        "files_created": ["list of new files created"],
        "files_modified": ["list of existing files modified"],
        "summary": "brief description of what was implemented",
        "test_results": "description of tests written and their status"
      }

  tools:
    dependencies:
      - io.github.massimilianopili:mcp-devops-tools
      - io.github.massimilianopili:mcp-filesystem-tools
    allowlist:
      - fs_list
      - fs_read
      - fs_write
      - fs_search
      - fs_grep
    mcpServers:
      - git
      - repo-fs
      - openapi
      - test

  ownership:
    ownsPaths:
      - backend/
      - templates/be/
    readOnlyPaths: []

  concurrency:
    maxConcurrentCalls: 3
