apiVersion: agent-framework/v1
kind: AgentManifest
metadata:
  name: dba-oracle-worker
  displayName: "DBA Oracle Worker"
  description: >
    Handles Oracle Database administration — PL/SQL, tablespace management, execution plans, partitioning, Data Guard, and AWR/ASH analysis.

spec:
  workerType: DBA
  workerProfile: dba-oracle
  topic: agent-tasks
  subscription: dba-oracle-worker-sub
  model:
    name: claude-sonnet-4-6
    maxTokens: 16384
    temperature: 0.2
  prompts:
    systemPromptFile: .claude/agents/dba-oracle/SKILL.md
    skills:
      - skills/crosscutting/
    instructions: |
      Implement the database task using Oracle Database.

      Follow these principles:
      - Oracle 19c+ / 23ai: modern PL/SQL, JSON duality views
      - PL/SQL: packages, procedures, functions, triggers
      - Execution plans: DBMS_XPLAN, SQL baselines, SQL Profiles
      - Indexes: B-tree, bitmap, function-based, reverse key
      - Partitioning: range, list, hash, composite, interval
      - Security: roles, profiles, audit policies, VPD
    resultSchema: |
      {
        "files_created": ["list of new files created"],
        "files_modified": ["list of existing files modified"],
        "git_commit": "suggested commit message",
        "summary": "brief description of what was implemented",
        "analysis": {
          "estimated_gain": "performance improvement description",
          "space_overhead": "disk space impact",
          "downtime_required": "none/minimal/required"
        }
      }
  tools:
    dependencies:
      - io.github.massimilianopili:mcp-devops-tools
      - io.github.massimilianopili:mcp-filesystem-tools
      - io.github.massimilianopili:mcp-sql-tools
      - io.github.massimilianopili:mcp-bash-tool
    allowlist:
      - fs_list
      - fs_read
      - fs_write
      - fs_search
      - fs_grep
      - db_query
      - db_tables
      - db_list_schemas
      - db_count
      - db_list_databases
      - bash_execute
    mcpServers:
      - git
      - repo-fs
      - bash
  ownership:
    ownsPaths:
      - database/
      - templates/dba/
    readOnlyPaths: []
  concurrency:
    maxConcurrentCalls: 3
