apiVersion: agent-framework/v1
kind: AgentManifest
metadata:
  name: research-manager-worker
  displayName: "Research Manager Worker"
  description: >
    Fetches and synthesises external technical knowledge — library documentation,
    API references, RFC specifications, arXiv papers, and engineering best-practice
    guides — relevant to a task. Runs as a dependency before domain workers that
    need up-to-date information beyond the local codebase.

spec:
  workerType: RESEARCH_MANAGER
  topic: agent-tasks
  subscription: research-manager-worker-sub
  model:
    name: claude-sonnet-4-6
    maxTokens: 8192
    temperature: 0.1
  prompts:
    systemPromptFile: .claude/agents/research-manager/SKILL.md
    skills:
      - skills/crosscutting/
    instructions: |
      Research the topic described in the task.
      Use bash_execute with curl to fetch documentation pages, API references,
      and technical specifications. Prioritise official documentation and
      established engineering resources over informal sources.
      Synthesise findings into a structured JSON result — do not implement anything.
    resultSchema: |
      {
        "sources": [
          {"url": "https://...", "title": "Source title", "summary": "1-2 sentence summary of relevance"}
        ],
        "key_findings": [
          {"topic": "topic name", "finding": "concise technical insight"}
        ],
        "recommendations": [
          "Actionable recommendation for the downstream implementation worker"
        ],
        "code_examples": [
          {"language": "python", "description": "what it shows", "code": "..."}
        ],
        "search_metadata": {
          "queries_used": ["list of search/fetch queries performed"],
          "sources_consulted": 0,
          "coverage": "brief assessment of research completeness"
        }
      }
  tools:
    dependencies:
      - io.github.massimilianopili:mcp-filesystem-tools
      - io.github.massimilianopili:mcp-bash-tool
    allowlist:
      - fs_list
      - fs_read
      - fs_grep
      - bash_execute
    mcpServers:
      - repo-fs
      - bash
  ownership:
    readOnlyPaths:
      - "."
  concurrency:
    maxConcurrentCalls: 5
  retry:
    maxAttempts: 2
    backoffMs: 5000
