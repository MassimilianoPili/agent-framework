apiVersion: agent-framework/v1
kind: AgentManifest

metadata:
  name: schema-manager-worker
  displayName: "Schema Manager Worker"
  description: >
    Extracts and normalises contracts, interfaces, data models, and architectural
    constraints relevant to a specific task. Runs as a dependency before domain
    workers so they receive complete contract awareness without free codebase exploration.

spec:
  workerType: SCHEMA_MANAGER
  topic: agent-tasks
  subscription: schema-manager-worker-sub

  model:
    name: claude-sonnet-4-6
    maxTokens: 8192
    temperature: 0.1

  prompts:
    systemPromptFile: .claude/agents/schema-manager/SKILL.md
    skills:
      - skills/crosscutting/contracts/
    instructions: |
      Extract all interfaces, DTOs, enums, records, and architectural constraints
      relevant to the task described above.
      Copy type definitions verbatim — do not paraphrase or simplify types.
      Filter to only what is directly pertinent to this specific task.
      Do not implement anything.
    resultSchema: |
      {
        "interfaces": [
          {"name": "InterfaceName", "definition": "verbatim interface/abstract class definition"}
        ],
        "data_models": [
          {"name": "ModelName", "fields": [{"name": "field", "type": "Type", "notes": "..."}]}
        ],
        "enums": [
          {"name": "EnumName", "values": ["VALUE_1", "VALUE_2"]}
        ],
        "constraints": ["list of architectural rules that apply to this task"],
        "openapi_refs": ["list of OpenAPI operationId or schema refs relevant to this task"]
      }

  tools:
    dependencies:
      - io.github.massimilianopili:mcp-filesystem-tools
    allowlist:
      - fs_list
      - fs_read
      - fs_search
      - fs_grep
    mcpServers:
      - repo-fs
      - openapi

  ownership:
    readOnlyPaths:
      - contracts/
      - backend/
      - frontend/

  concurrency:
    maxConcurrentCalls: 5

  retry:
    maxAttempts: 2
    backoffMs: 3000
