components:
  parameters:
    PlanId:
      name: planId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier of the execution plan

    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier of the plan item

    SnapshotId:
      name: snapshotId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique identifier of the plan snapshot

  schemas:
    PlanRequest:
      type: object
      required:
        - spec
      properties:
        spec:
          type: string
          minLength: 10
          description: Natural language specification of what to build
        constraints:
          type: object
          additionalProperties: true
          description: Optional constraints (database, auth, framework preferences)
        tags:
          type: array
          items:
            type: string
          description: Optional tags for categorization
        budget:
          $ref: "#/components/schemas/Budget"
        maxDepth:
          type: integer
          minimum: 1
          default: 3
          description: Maximum nesting depth for SUB_PLAN items. A plan at this depth cannot spawn further sub-plans.

    PlanResponse:
      type: object
      required:
        - id
        - status
        - spec
        - createdAt
        - items
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/PlanStatus"
        spec:
          type: string
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        failureReason:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/PlanItemResponse"
        councilReport:
          type: string
          nullable: true
          description: JSON CouncilReport from the pre-planning council session. Null if council was disabled or the plan predates the council feature.

    PlanItemResponse:
      type: object
      required:
        - id
        - ordinal
        - taskKey
        - title
        - workerType
        - status
        - dependsOn
      properties:
        id:
          type: string
          format: uuid
        ordinal:
          type: integer
          minimum: 0
        taskKey:
          type: string
          pattern: "^(BE|FE|AI|CT|RV|CM|SM|HM|TM|MG|SP|CL)-[0-9]{3}$"
        title:
          type: string
        description:
          type: string
          nullable: true
        workerType:
          $ref: "#/components/schemas/WorkerType"
        workerProfile:
          type: string
          nullable: true
          pattern: "^[a-z][a-z0-9-]*$"
        status:
          $ref: "#/components/schemas/ItemStatus"
        dependsOn:
          type: array
          items:
            type: string
        dispatchedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true
        failureReason:
          type: string
          nullable: true
        issueSnapshot:
          type: string
          nullable: true
          description: |
            JSON snapshot of the issue from the external tracker, populated by the
            TASK_MANAGER worker. Null until TASK_MANAGER completes.
        aggregatedReward:
          type: number
          format: float
          nullable: true
          minimum: -1.0
          maximum: 1.0
          description: |
            Bayesian-weighted aggregate of reviewScore (0.50), processScore (0.30),
            and qualityGateScore (0.20). Null until at least one source is available.
        rewardSources:
          type: string
          nullable: true
          description: |
            JSON breakdown of individual reward source values and their effective weights.
            Example: {"review":0.8,"process":0.6,"quality_gate":null,"weights":{"review":0.625,...}}

    QualityGateReportResponse:
      type: object
      required:
        - id
        - planId
        - passed
        - generatedAt
      properties:
        id:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        passed:
          type: boolean
        summary:
          type: string
          nullable: true
        findings:
          type: array
          items:
            type: string
        generatedAt:
          type: string
          format: date-time
        metrics:
          type: object
          nullable: true
          description: Quantitative quality metrics (null until metric collection is implemented)
          properties:
            testCoverage:
              type: number
              minimum: 0
              maximum: 100
            securityVulnerabilities:
              type: integer
              minimum: 0
            contractBreakingChanges:
              type: integer
              minimum: 0
            buildPassed:
              type: boolean

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code (e.g. PLAN_NOT_FOUND, VALIDATION_ERROR)
        message:
          type: string
          description: Human-readable error description
        traceId:
          type: string
          description: Correlation ID for distributed tracing
        details:
          type: array
          items:
            type: string
          description: Additional detail messages (e.g. field validation errors)

    PlanStatus:
      type: string
      enum:
        - PENDING
        - RUNNING
        - COMPLETED
        - FAILED
        - PAUSED

    ItemStatus:
      type: string
      enum:
        - WAITING
        - DISPATCHED
        - RUNNING
        - DONE
        - FAILED
        - AWAITING_APPROVAL

    WorkerType:
      type: string
      enum:
        - BE
        - FE
        - AI_TASK
        - CONTRACT
        - REVIEW
        - CONTEXT_MANAGER
        - SCHEMA_MANAGER
        - HOOK_MANAGER
        - TASK_MANAGER
        - COMPENSATOR_MANAGER
        - SUB_PLAN
        - COUNCIL_MANAGER
        - MANAGER
        - SPECIALIST

    CouncilReport:
      type: object
      description: Structured advisory output produced by the pre-planning or task-level council session.
      properties:
        selectedMembers:
          type: array
          items:
            type: string
          description: Profiles of council members that participated (e.g. be-manager, security-specialist)
        architectureDecisions:
          type: array
          items:
            type: string
          description: Binding architectural decisions the council reached consensus on
        techStackRationale:
          type: string
          nullable: true
          description: Rationale for the chosen technology stack
        securityConsiderations:
          type: array
          items:
            type: string
          description: Security constraints and requirements identified by the council
        dataModelingGuidelines:
          type: string
          nullable: true
          description: Data modeling conventions and constraints
        apiDesignGuidelines:
          type: string
          nullable: true
          description: API design conventions and requirements
        testingStrategy:
          type: string
          nullable: true
          description: Test strategy recommended by the council
        memberInsights:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: Per-member raw insights keyed by profile name

    DispatchAttemptResponse:
      type: object
      required:
        - id
        - attemptNumber
        - dispatchedAt
        - success
      properties:
        id:
          type: string
          format: uuid
        attemptNumber:
          type: integer
          minimum: 1
        dispatchedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        success:
          type: boolean
        failureReason:
          type: string
          nullable: true
        durationMs:
          type: integer
          format: int64
          nullable: true

    PlanSnapshotResponse:
      type: object
      required:
        - id
        - planId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        planId:
          type: string
          format: uuid
        label:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    Budget:
      type: object
      description: |
        Per-workerType token limits and the enforcement policy when limits are exceeded.
      properties:
        onExceeded:
          type: string
          enum:
            - FAIL_FAST
            - NO_NEW_DISPATCH
            - SOFT_LIMIT
          description: |
            Enforcement mode: FAIL_FAST (dispatch blocked, item → FAILED),
            NO_NEW_DISPATCH (dispatch skipped, item stays WAITING),
            SOFT_LIMIT (warning logged, dispatch proceeds).
        perWorkerType:
          type: object
          additionalProperties:
            type: integer
            format: int64
          description: Token limit per worker type (e.g. {"BE": 50000, "CONTEXT_MANAGER": 20000})

    EloStatResponse:
      type: object
      required:
        - workerProfile
        - eloRating
        - matchCount
        - winCount
        - avgReward
      properties:
        workerProfile:
          type: string
          description: Worker profile identifier (e.g. "be-java", "be-go")
        eloRating:
          type: number
          format: double
          description: Current ELO rating (starts at 1600)
        matchCount:
          type: integer
          description: Total number of pairwise comparisons
        winCount:
          type: integer
          description: Number of comparisons won
        avgReward:
          type: number
          format: double
          description: Running average of aggregatedReward across all tasks
