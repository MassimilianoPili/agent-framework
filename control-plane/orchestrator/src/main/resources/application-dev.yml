spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agentframework
    username: agentframework
    password: agentframework

  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

# Dev profile uses JMS/Artemis by default (no messaging.provider override needed)
# Artemis connection is configured in application.yml (spring.artemis.*)

logging:
  level:
    com.agentframework: DEBUG
