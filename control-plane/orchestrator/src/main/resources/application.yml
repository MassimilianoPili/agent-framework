  defaults:
    BE: be-java
    FE: fe-react
    DBA: dba-postgres
    MOBILE: mobile-swift
    AI_TASK: ~          # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    CONTRACT: ~         # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    REVIEW: ~           # Nessun profilo — usa WorkerType.topicName() (agent-reviews)
    CONTEXT_MANAGER: ~  # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    SCHEMA_MANAGER: ~   # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    TASK_MANAGER: task-manager
    COMPENSATOR_MANAGER: compensator-manager
    HOOK_MANAGER: hook-manager
    AUDIT_MANAGER: audit-manager
    EVENT_MANAGER: event-manager
    MANAGER: ~          # Advisory manager — usa WorkerType.topicName() (agent-advisory)
    SPECIALIST: ~       # Advisory specialist — usa WorkerType.topicName() (agent-advisory)
    COUNCIL_MANAGER: ~  # Intercettato in-process — mai dispatched

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Orchestrator Leader Election — Redis-based distributed lock for multi-instance safety (#22)
# When enabled, only the instance holding the lock dispatches tasks and consumes results.
# Failover latency ≈ ttl-ms (default 30 s). refresh-ms must be < ttl-ms/3.
orchestrator:
  leader-election:
    enabled: true
    ttl-ms: 30000         # Lock TTL in milliseconds
    refresh-ms: 10000     # Heartbeat interval in milliseconds
  stale-detection:
    default-timeout-minutes: 30   # Fallback for worker types not listed below
    worker-timeouts:
      AI_TASK: 120          # Complex code generation tasks — allow 2 h
      ADVISORY: 90          # Council advisory sessions
      REVIEW: 60            # Review analysis — moderately long
      BE: 90                # Backend code workers
      FE: 90                # Frontend code workers
      CONTEXT_MANAGER: 15   # Fast file-based exploration
      SCHEMA_MANAGER: 15    # Fast schema validation
      HOOK_MANAGER: 10      # Deterministic policy evaluation
      RAG_MANAGER: 20       # Semantic search (network + DB bound)

# Council System — advisory pre-planning and in-plan council sessions
# Set council.enabled=false for backward compatibility (plan executes without council)
council:
  enabled: true
  max-members: 5
  pre-planning-enabled: true    # Run council before PlannerService.decompose()
  task-session-enabled: true    # Handle COUNCIL_MANAGER tasks in-process
  submodular-selection-enabled: false  # Use CELF greedy (SubmodularSelector) instead of LLM for member selection
  quadratic-voting-enabled: false      # #49: Quadratic Voting for recommendation weighting
  base-voice-credits: 100             # Voice credit budget per council member (QV)
  taste-profile:
    enabled: true               # GP predictor for plan decomposition quality (#13)
    max-training-points: 200    # Max historical plans used for GP fit
    noise-variance: 0.1         # GP noise variance (observation noise)
    length-scale: 2.0           # RBF kernel length scale (feature space units)

# Enrichment Pipeline — auto-injection of CONTEXT_MANAGER, RAG_MANAGER, SCHEMA_MANAGER
# tasks as dependencies of domain workers after planner decomposition.
# Level 1 (planner prompt) generates them if the LLM decides to; Level 2 (auto-inject)
# ensures they are always present regardless of planner output.
enrichment:
  auto-inject: true
  include-context-manager: true   # CM-001: codebase exploration (always recommended)
  include-rag: true               # RM-001: semantic search on vectorDB + graphDB
  include-schema: false           # SM-001: API interface extraction (opt-in)
  include-tool-manager: false     # TM-*: per-task tool policy refinement (opt-in, adds N Haiku calls)

# Ralph-Loop — quality gate feedback loop.
# When the quality gate fails, implicated items are re-queued with feedback.
ralph-loop:
  enabled: true
  max-iterations: 2         # max times a single item can be re-queued by ralph-loop
  min-score-threshold: 80   # quality gate score below which items are re-queued

# External issue tracker sync — propagates plan events to external tracker via MCP tool.
# Disabled by default: enable when the tracker-mcp server is deployed and reachable.
tracker:
  sync:
    enabled: false

# RAG Engine — semantic search pipeline (pgvector + Ollama + hybrid search)
rag:
  enabled: true
  ollama:
    embedding-model: mxbai-embed-large
    reranking-model: qwen2.5:1.5b
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  ingestion:
    chunk-size: 512
    chunk-overlap: 100
    contextual-enrichment: true
    max-file-size-kb: 500
    include-extensions: java,yml,yaml,md,xml,json,go,rs,js,ts,py,sql
    file-watcher-enabled: false
  search:
    hybrid-enabled: true
    hyde-enabled: true
    reranker-type: cascade
    top-k: 20
    final-k: 8
    similarity-threshold: 0.5
    rrf-k: 60
  cache:
    redis-db: 5
    embedding-ttl-hours: 24
    search-result-ttl-minutes: 60

# GP Worker Selection — adaptive profile selection via Gaussian Process regression.
# When enabled, predicts expected reward for each candidate profile and selects the best.
# When disabled (default), uses static default profile assignment (zero behavioral change).
gp:
  enabled: false
  kernel:
    signal-variance: 1.0
    length-scale: 1.0
  noise-variance: 0.1
  max-training-size: 500
  default-prior-mean: 0.5
  cache:
    ttl-minutes: 5
    enabled: true
  budget:
    alpha: 1.0  # dynamic budget modulation: effectiveLimit = base × (1 + alpha × sigma²) × clip(mu, 0.3, 1.0)
  context-quality:
    weights:
      file-relevance: 0.45
      entropy: 0.30
      kl-divergence: 0.25

# PID Adaptive Token Budget (#37)
# Adjusts HookPolicy.maxTokenBudget per (planId, workerType) based on error between
# estimated and actual token consumption. Zero LLM cost — in-memory feedback loop.
budget:
  pid:
    enabled: false
    kp: 0.5
    ki: 0.1
    kd: 0.2
    min-budget: 5000
    max-budget: 500000
    integral-limit: 100000.0
    warmup-samples: 3

# Self-Organized Criticality (Sandpile Model)
# Monitors system-level load per WorkerType and detects failure cascades.
# C < 0.5 = stable, 0.5-0.8 = warning, >= 0.8 = alert (publishes SYSTEM_CRITICALITY event).
criticality:
  enabled: true
  interval-ms: 30000            # every 30 seconds (#56)
  target-inventory: 5           # per WorkerType (threshold = target * 3 = 15)
  spillover-ratio: 0.3          # fraction of threshold spilled to each neighbour
  max-topple-iterations: 50     # cascade halt limit
  threshold-stable: 0.5         # C below this → STABLE
  threshold-warning: 0.8        # C at/above this → ALERT

# Verifiable Compute — Ed25519 signature verification (#31)
# When enabled, the orchestrator verifies cryptographic signatures on worker results.
# TOFU (Trust-On-First-Use): unknown keys are auto-registered on first valid signature.
agent:
  crypto:
    verification-enabled: true    # verify worker result signatures (disable for legacy workers)

# Federation Differential Privacy (#43)
# When enabled, metrics shared with federated peers are privatised via Laplace mechanism.
# Budget: max DP queries per UTC day (basic sequential composition).
federation:
  privacy:
    enabled: false                # opt-in (disabled by default)
    epsilon: 1.0                  # ε: smaller = more privacy, more noise
    max-queries-per-day: 100      # daily DP budget (basic composition: K × ε)
    elo-sensitivity: 32.0         # K-factor: max single-match ELO change
    reward-sensitivity: 2.0       # reward range: [-1, +1] → sensitivity = 2

# Swarm Intelligence — ACO Pheromone Matrix
# Tracks successful workflow patterns (workerType transitions) and provides hints to the planner.
pheromone:
  enabled: true
  evaporation-rate: 0.1          # rho: tau(t+1) = (1 - rho) * tau(t)
  initial-pheromone: 1.0         # tau_0
  alpha: 1.0                    # exponent in transition probability
  evaporation-interval-ms: 3600000  # every hour

# Portfolio Theory (Markowitz Mean-Variance) — risk-adjusted budget allocation
portfolio:
  enabled: true
  risk-free-rate: 0.3       # R_f per Sharpe ratio
  max-weight: 0.6           # w_i <= 0.6 (max concentrazione per worker type)
  grid-steps: 20            # risoluzione griglia simplesso

# Market Making Dispatch (Bid-Ask Spread + Inventory Risk)
dispatch:
  inventory:
    enabled: false                   # disabilitato per default
    target-multiplier: 2.0           # target = avg(dispatched/hr) × multiplier
    decay-threshold-hours: 2.0       # DISPATCHED stale → contano come 0.5

# Causal Inference (Pearl's Do-Calculus) — root cause analysis for failed tasks
causal:
  enabled: true

# Wasserstein Drift Detection — distribution alignment monitoring
drift:
  enabled: true
  check-interval-ms: 3600000     # every hour
  threshold: 0.15                # W_1 above this triggers drift alert

# Prospect Theory (Kahneman-Tversky) — behavioral bias for worker selection
prospect-theory:
  enabled: true
  loss-aversion-lambda: 2.25    # lambda: peso perdite vs guadagni

# Hedge Algorithm (Multiplicative Weights) — online learning regret bounds
hedge:
  enabled: true
  learning-rate: 0.0            # 0 = auto: eta = sqrt(ln(K)/T)
  horizon: 1000                 # T: orizzonte di pianificazione

# Kelly Criterion — optimal budget fraction sizing
kelly:
  enabled: true
  fractional-kelly: 0.5         # half-Kelly (conservativo)
  max-fraction: 0.5             # clamp massimo

# Optimal Stopping (Secretary Problem) — threshold-based acceptance
optimal-stopping:
  enabled: true
  observation-fraction: 0.3679  # 1/e

# Calibration Audit (Dutch Book) — prediction quality monitoring
calibration:
  enabled: true
  num-bins: 10
  dutch-book-threshold: 0.15    # max|acc - conf| per alert
  check-interval-ms: 3600000   # ogni ora

# VCG Mechanism Design (Vickrey-Clarke-Groves) — truthful task pricing
vcg:
  enabled: true

# Shapley Value — fair credit attribution for plan contributors
shapley:
  enabled: true
  monte-carlo-samples: 10000       # approximation samples for large N
  max-exact-players: 10            # above this, use Monte Carlo

# Model Predictive Control — receding horizon task scheduling
mpc:
  enabled: true
  horizon: 3                        # prediction steps
  max-candidates: 10                # max worker-task pairs per step

# Fisher Information Metric — uncertainty decomposition
fisher:
  enabled: true
  min-observations: 5               # minimum data points for Fisher estimate

# Value of Information — exploration vs exploitation
voi:
  enabled: true
  exploration-fraction: 0.15        # budget fraction reserved for exploration
  monte-carlo-samples: 500          # MC integration samples for EVSI

# Goodhart's Law Mitigation — metric health monitoring
goodhart:
  enabled: true
  window-size: 50                   # rolling window for correlation tracking
  divergence-threshold: 0.3         # Pearson r below this = divergence alert
  min-sample-size: 10               # regressional Goodhart detection threshold

# Real Options Theory — task deferral valuation (Dixit & Pindyck 1994)
real-options:
  enabled: true
  discount-rate: 0.05              # r: cost of delay
  urgency-weight: 0.1             # delta base: convenience yield
  min-observations: 5              # minimum data for volatility estimate

# Contract Theory — SLA worker incentive design (Hart & Holmstrom 2016)
contract-theory:
  enabled: true
  default-quality-target: 0.6     # baseline quality expectation
  default-bonus-multiplier: 1.5   # beta: reward for above-target quality
  default-penalty-rate: 0.5       # penalty for below-target quality
  learning-rate: 0.1              # Bayesian update rate for contract adjustment

# Cost Estimation — per-task token cost tracking (#26L1)
cost:
  default-pricing:
    input-per-million: 3.0
    output-per-million: 15.0
  models:
    claude-opus-4-6:
      input-per-million: 15.0
      output-per-million: 75.0
    claude-sonnet-4-6:
      input-per-million: 3.0
      output-per-million: 15.0
    claude-haiku-4-5:
      input-per-million: 0.80
      output-per-million: 4.0

# Task Auto-Split — decompose expensive tasks into sub-plans (#26L2)
task-split:
  enabled: false                       # opt-in (disabled by default)
  threshold-tokens: 50000              # estimated input token threshold for split trigger
  threshold-action: SPLIT              # WARN | SPLIT | BLOCK
  max-split-attempts: 1                # max auto-split per item (guard against infinite recursion)
  description-length-multiplier: 25    # chars → estimated tokens heuristic
  gp-sigma2-threshold: 0.5            # GP uncertainty above this uses upper-bound estimate

# Token Ledger Observability (#33) — low-efficiency alert threshold
token-ledger:
  low-efficiency-threshold: 0.15

# Global Task Assignment (#42) — Hungarian Algorithm for batch dispatch
global-assignment:
  enabled: false                        # opt-in (disabled by default, falls back to per-task GP)
  critical-path-boost: 0.2             # mu boost for tasks on the DAG critical path
  min-dispatchable: 2                  # minimum batch size to trigger global assignment

# Reputation Staking (#47) — game-theoretic accountability for worker profiles
reputation:
  staking:
    enabled: false                        # opt-in (disabled by default)
    base-stake-rate: 0.05                # 5% of current ELO
    max-complexity: 2.0                  # sigma² clamp (0 = basale only)
    success-bonus-rate: 0.30             # 30% of stake as bonus on success

# Superrationality (Hofstadter) — cooperative equilibrium between worker types
superrationality:
  enabled: true
  min-overlap: 2                  # min co-occurrences to compute cooperation gain

# Functional Decision Theory / TDT (Yudkowsky) — timeless policy-based dispatch
fdt:
  enabled: true
  similarity-threshold: 0.85     # cosine similarity threshold for similar tasks
  min-similar-tasks: 3           # minimum similar tasks to recommend a profile

# Minimum Description Length (Rissanen) — Occam's razor for plan complexity
mdl:
  enabled: true

# H-Infinity Robust Control (Zhou-Doyle) — worst-case worker profile selection
h-infinity:
  enabled: true
  confidence-level: 0.95         # tail probability for H∞ norm (95th percentile)

# Edge of Chaos (Langton) — auto-tune exploration via Lyapunov proxy
edge-of-chaos:
  enabled: true
  target-lyapunov: 0.0           # target Lyapunov exponent (0 = edge of chaos)
  adaptation-rate: 0.01          # step size for exploration adjustment

# Active Inference / Free Energy Principle (Friston) — variational dispatch
active-inference:
  enabled: true
  kl-weight: 1.0                 # weight for KL divergence term (uncertainty penalty)

# Information Bottleneck (Tishby) — embedding compression for dispatch similarity
information-bottleneck:
  enabled: true
  compression-ratio: 0.125       # target dim / original dim (e.g. 1024 → 128)
  beta: 1.0                      # trade-off: high β → more compression

# Spin Glass / Simulated Annealing (Kirkpatrick) — task ordering optimisation
spin-glass:
  enabled: true
  max-iterations: 10000          # SA iterations
  cooling-rate: 0.95             # geometric cooling: T_i = T₀ × rate^i

# Byzantine Fault Tolerance (Lamport-Shostak-Pease) — majority voting on retries
bft:
  enabled: true
  majority-threshold: 0.67       # fraction of votes required for consensus (PBFT: 2/3)

# Renormalization Group (Wilson) — multi-scale coupling analysis for plans
renormalization-group:
  enabled: true
  max-scales: 3                  # number of coarsening levels (fine/medium/coarse)

# Persistent Homology (Edelsbrunner) — topological structure of embedding space
persistent-homology:
  enabled: true
  max-epsilon: 0.5               # maximum scale for Vietoris-Rips complex
  epsilon-steps: 50              # number of ε steps in barcode computation

# Functorial Semantics (Mac Lane) — category-theoretic compositionality of plans
functorial-semantics:
  enabled: true
  compositionality-check: true
  compositionality-threshold: 0.3   # L∞ error threshold to declare compositional

# Petri Nets (Peterson) — reachability, deadlock, liveness of plan DAG
petri-nets:
  enabled: true

# CSP Channel Verifier (Hoare) — protocol adherence + deadlock freedom of task event traces
csp-verifier:
  enabled: true
  max-events-per-plan: 500          # cap to avoid OOM on very long plans

# PAC-Bayes (McAllester) — GP convergence bounds and required sample size
pac-bayes:
  enabled: true
  default-epsilon: 0.05             # desired generalisation error tolerance
  default-delta: 0.05               # acceptable failure probability (→ 95% confidence)

# Social Choice (Arrow/Schulze) — voting protocol for council preference aggregation
social-choice:
  enabled: true
  default-method: SCHULZE           # PLURALITY | BORDA | SCHULZE | APPROVAL

# Council Diversity (Scott & Page DPT) — Shannon entropy + Kendall τ analysis
council-diversity:
  enabled: true

# Ergodic Budget Analyzer (Ole Peters 2019) — time-average vs ensemble-average budget allocation
ergodic-budget:
  enabled: true
  max-samples: 500                  # max task_outcomes rows per worker type

# Queuing Capacity Planner (M/G/1 P-K formula) — Redis stream saturation & consumer sizing
queuing:
  enabled: true
  max-samples: 1000                 # max completion records per worker type
  target-wait-seconds: 30           # target mean queue wait for consumer sizing

# Thompson Sampling (Bayesian exploration over worker-type reward posteriors)
thompson-sampling:
  enabled: true
  max-samples-per-type: 200         # max reward observations per worker type

# Compressed Sensing Retriever (OMP sparse recovery for RAG query optimisation)
compressed-sensing:
  enabled: true

# Viable System Model Auditor (Beer VSM S1-S5 audit of framework architecture)
vsm:
  enabled: true
  max-samples: 2000                 # max task_outcomes rows for variety analysis

# Actor Model Supervisor (Hewitt 1973) — worker crash detection + backpressure analysis
actor-model:
  enabled: true
  backpressure-threshold: 10        # max message count before actor is flagged as backpressured
  crash-rate-threshold: 0.3         # fraction of zero-reward tasks to flag actor as crashed

# Chandy-Lamport Snapshotter (1985) — consistent distributed snapshot of in-flight tasks
chandy-lamport:
  enabled: true

# LTL Policy Verifier (Linear Temporal Logic) — safety + liveness verification of plan traces
ltl-verifier:
  enabled: true
  max-context-requests: 3           # max CONTEXT_REQUESTED events per task before L2 violation

# Description Logic Matcher (ALC) — capability subsumption matching for worker selection
description-logic:
  enabled: true

# Information Foraging Service (Pirolli & Card 1999) — Marginal Value Theorem for RAG retrieval
information-foraging:
  enabled: true
  stop-threshold-sigma: 1.0         # σ multiplier for IR stop threshold (below mean - σ = skip)

# Stigmergy Coordinator (Grassé 1959 + Dorigo ACO) — pheromone-based indirect routing
stigmergy:
  enabled: true
  evaporation-rate: 0.1             # ρ: pheromone decay per update cycle
  pheromone-alpha: 1.0              # α: pheromone exponent in selection probability
  deposit-q: 1.0                    # Q: pheromone deposit quantity per unit reward

# Logical Induction (Garrabrant 2016) — adaptive posterior floor guard + convergence monitor
logical-induction:
  enabled: false
  epsilon: 0.01                     # hard minimum floor (prevents posterior collapse to 0)
  smoothing-k: 10                   # smoothing constant: floor = max(ε, 1/(n+k))
  convergence-window: 20            # sliding window size for variance computation
  convergence-threshold: 0.005      # variance below this → profile converged

# Semantic Caching (Bang 2023) — embedding-based cache for GP worker selection
semantic-cache:
  enabled: false
  similarity-threshold: 0.92        # cosine similarity threshold for cache hit
  max-entries-per-type: 200         # max cached entries per worker type
  ttl-minutes: 60                   # cache entry time-to-live

# Context Engineering (#107) — knapsack token budget allocation for LLM context window
context-engineering:
  enabled: false
  compaction-threshold: 0.85          # utilization ratio above this triggers compaction

# Curriculum Prompting (#108, Bengio 2009) — difficulty-ordered few-shot example selection
curriculum-prompting:
  enabled: false
  max-examples-per-type: 50           # max golden examples per worker type
  selection-k: 3                      # default number of exemplars to select

# Factorised Belief Models (#115, Ruiz-Serra AAMAS 2025) — per-agent Gaussian beliefs + EFE
factorised-beliefs:
  enabled: false
  prior-mu: 0.5                       # prior mean competence estimate
  prior-sigma2: 1.0                   # prior variance (uncertainty)
  exploration-lambda: 1.0             # EFE exploration weight (lambda)

# MCTS Dispatch (#112, Kocsis-Szepesvári 2006) — Monte Carlo Tree Search for plan-level dispatch
mcts-dispatch:
  enabled: false
  exploration-c: 1.41                 # PUCT exploration constant (sqrt(2))
  max-simulations-factor: 50          # simulations = tasks × factor
  min-steps-for-mcts: 4              # plans with fewer steps use greedy fallback

# Iterated Amplification (#109, Christiano 2018) — multi-level feedback cascade
iterated-amplification:
  enabled: false
  auto-threshold: 0.3                 # complexity below this → AUTO
  model-threshold: 0.7                # complexity below this → MODEL, above → HUMAN
  spot-check-ratio: 0.1              # fraction of AUTO decisions spot-checked by human

# Worker-to-Worker Handoff (#113, AutoGen Swarm) — confidence-based direct delegation
handoff-routing:
  enabled: false
  confidence-threshold: 0.7           # confidence above this → direct handoff
  max-chain-length: 5                 # max delegation chain depth (anti-loop)

# Markov Shapley Value (#114, Wang NeurIPS 2022) — sequential credit assignment
markov-shapley:
  enabled: false
  default-permutations: 1000          # Monte Carlo permutation samples
  convergence-se-threshold: 0.01      # max standard error for convergence

# Observability SLIs (Google SRE) — service level indicators + error budgets
observability-sli:
  enabled: false
  slo-targets:
    availability: 0.95              # DONE / (DONE + FAILED) target
    latency-p99-seconds: 300        # max P99 completion time (seconds)
    quality-threshold: 0.5          # min reward fraction above this value
  error-budget-window-hours: 720    # 30 days
  burn-rate-threshold-warning: 1.0  # burn rate >= 1.0 → WARNING
  burn-rate-threshold-critical: 2.0 # burn rate >= 2.0 → CRITICAL

# ── Fase 14: Adaptive Operations & Online Learning ──────────────────────────

# BOCPD (#117, Adams & MacKay 2007) — Bayesian Online Changepoint Detection on SLI streams
agent-framework:
  bocpd:
    enabled: false
    hazard-lambda: 200             # expected run length between changepoints
    threshold: 0.6                 # P(r=0) above this → changepoint declared
    max-run-length: 500            # memory bound for run-length posterior
    poll-interval-ms: 30000        # SLI polling interval
    scales: 60,300,900             # multiscale aggregation (1min, 5min, 15min)

  # MCTS Online (#119) — online policy learning with EMA, RAVE, BAMCP
  mcts-online:
    enabled: false
    ema-alpha: 0.3                 # EMA decay factor (higher = faster adaptation)
    rave-k: 500                    # RAVE equivalence parameter
    bamcp-samples: 10              # GP posterior samples for root initialization
    exploration-c: 1.41            # PUCT exploration constant
    decay-interval-ms: 60000       # EMA decay sweep interval

  # Self-Refine (#120, Huang 2023) — gated self-refinement with flip-rate monitoring
  self-refine:
    enabled: false
    max-iterations: 3              # max self-refine iterations before escalation
    flip-rate-threshold: 0.5       # oscillation detection threshold
    allowed-worker-types: BE,FE,CONTRACT,DBA  # worker types with objective metrics
    flip-rate-window: 5            # recent iterations for flip-rate calculation

  # Causal Shapley (#124, Heskes 2020) — do-calculus interventional attribution
  causal-shapley:
    enabled: false
    max-coalitions: 1000           # Monte Carlo coalition samples
    min-data-points: 10            # minimum data for reliable estimation
    intervention-type: remove      # intervention type: remove or counterfactual

  # MAST (#126) — Multi-Agent System failure Taxonomy + Self-Healing Router
  mast:
    enabled: false
    oscillation-window: 5          # iterations to check for oscillation (FM11)
    cascade-depth: 3               # max dependency chain for cascading failure (FM10)
    min-spec-length: 30            # spec below this → FM1 ambiguous
    elo-collapse-threshold: 800.0  # ELO below this → FM9 trust degradation
    partial-completion-threshold: 0.3  # done ratio above this with failures → FM13

logging:
  level:
    com.agentframework: INFO
    org.springframework.ai: DEBUG
