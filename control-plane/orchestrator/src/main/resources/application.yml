spring:
  application:
    name: agent-framework-orchestrator

  threads:
    virtual:
      enabled: true    # Java 21: Tomcat usa virtual threads per ogni request HTTP

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/agentframework
    username: ${DB_USER:agentframework}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    model:
      chat: anthropic     # Ollama is used only for embeddings (RAG), not as a chat model
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          timeout: 120s
          max-tokens: 4096

# Messaging SPI — provider: redis (default), jms, servicebus
# JMS/Artemis: activate profile 'jms' (application-jms.yml)
messaging:
  provider: redis
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    database: 3
    cache-database: 4
  agent-results:
    topic: agent-results
    subscription: orchestrator-group

# Caching — provider: redis (default), simple
cache:
  provider: redis

# Worker Multi-Stack — profile registry for routing
worker-profiles:
  profiles:
    be-java:
      workerType: BE
      topic: agent-tasks
      subscription: be-java-worker-sub
      displayName: "Backend Java (Spring Boot)"
    be-go:
      workerType: BE
      topic: agent-tasks
      subscription: be-go-worker-sub
      displayName: "Backend Go"
    be-rust:
      workerType: BE
      topic: agent-tasks
      subscription: be-rust-worker-sub
      displayName: "Backend Rust"
    be-node:
      workerType: BE
      topic: agent-tasks
      subscription: be-node-worker-sub
      displayName: "Backend Node.js"
    fe-react:
      workerType: FE
      topic: agent-tasks
      subscription: fe-react-worker-sub
      displayName: "Frontend React"
    task-manager:
      workerType: TASK_MANAGER
      topic: agent-tasks
      subscription: task-manager-worker-sub
      displayName: "Task Manager"
    compensator-manager:
      workerType: COMPENSATOR_MANAGER
      topic: agent-tasks
      subscription: compensator-manager-worker-sub
      displayName: "Compensator Manager"
    hook-manager:
      workerType: HOOK_MANAGER
      topic: agent-tasks
      subscription: hook-manager-worker-sub
      displayName: "Hook Manager"
    audit-manager:
      workerType: AUDIT_MANAGER
      topic: agent-tasks
      subscription: audit-manager-worker-sub
      displayName: "Audit Manager"
    event-manager:
      workerType: EVENT_MANAGER
      topic: agent-tasks
      subscription: event-manager-worker-sub
      displayName: "Event Manager"
  defaults:
    BE: be-java
    FE: fe-react
    AI_TASK: ~          # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    CONTRACT: ~         # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    REVIEW: ~           # Nessun profilo — usa WorkerType.topicName() (agent-reviews)
    CONTEXT_MANAGER: ~  # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    SCHEMA_MANAGER: ~   # Nessun profilo — usa WorkerType.topicName() (agent-tasks)
    TASK_MANAGER: task-manager
    COMPENSATOR_MANAGER: compensator-manager
    HOOK_MANAGER: hook-manager
    AUDIT_MANAGER: audit-manager
    EVENT_MANAGER: event-manager
    MANAGER: ~          # Advisory manager — usa WorkerType.topicName() (agent-advisory)
    SPECIALIST: ~       # Advisory specialist — usa WorkerType.topicName() (agent-advisory)
    COUNCIL_MANAGER: ~  # Intercettato in-process — mai dispatched

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Council System — advisory pre-planning and in-plan council sessions
# Set council.enabled=false for backward compatibility (plan executes without council)
council:
  enabled: true
  max-members: 5
  pre-planning-enabled: true    # Run council before PlannerService.decompose()
  task-session-enabled: true    # Handle COUNCIL_MANAGER tasks in-process

# Ralph-Loop — quality gate feedback loop.
# When the quality gate fails, implicated items are re-queued with feedback.
ralph-loop:
  enabled: true
  max-iterations: 2         # max times a single item can be re-queued by ralph-loop
  min-score-threshold: 80   # quality gate score below which items are re-queued

# External issue tracker sync — propagates plan events to external tracker via MCP tool.
# Disabled by default: enable when the tracker-mcp server is deployed and reachable.
tracker:
  sync:
    enabled: false

# RAG Engine — semantic search pipeline (pgvector + Ollama + hybrid search)
rag:
  enabled: true
  ollama:
    embedding-model: mxbai-embed-large
    reranking-model: qwen2.5:1.5b
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
  ingestion:
    chunk-size: 512
    chunk-overlap: 100
    contextual-enrichment: true
    max-file-size-kb: 500
    include-extensions: java,yml,yaml,md,xml,json,go,rs,js,ts,py,sql
    file-watcher-enabled: false
  search:
    hybrid-enabled: true
    hyde-enabled: true
    reranker-type: cascade
    top-k: 20
    final-k: 8
    similarity-threshold: 0.5
    rrf-k: 60
  cache:
    redis-db: 5
    embedding-ttl-hours: 24
    search-result-ttl-minutes: 60

# GP Worker Selection — adaptive profile selection via Gaussian Process regression.
# When enabled, predicts expected reward for each candidate profile and selects the best.
# When disabled (default), uses static default profile assignment (zero behavioral change).
gp:
  enabled: false
  kernel:
    signal-variance: 1.0
    length-scale: 1.0
  noise-variance: 0.1
  max-training-size: 500
  default-prior-mean: 0.5
  cache:
    ttl-minutes: 5
    enabled: true
  budget:
    alpha: 1.0  # dynamic budget modulation: effectiveLimit = base × (1 + alpha × sigma²) × clip(mu, 0.3, 1.0)

logging:
  level:
    com.agentframework: INFO
    org.springframework.ai: DEBUG
