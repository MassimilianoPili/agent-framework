spring:
  application:
    name: agent-framework-orchestrator

  threads:
    virtual:
      enabled: true    # Java 21: Tomcat usa virtual threads per ogni request HTTP

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/agentframework
    username: ${DB_USER:agentframework}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    model:
      chat: anthropic     # Ollama is used only for embeddings (RAG), not as a chat model
    anthropic:
      base-url: ${SPRING_AI_ANTHROPIC_BASE_URL:https://api.anthropic.com}
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-opus-4-6
          timeout: 120s
          max-tokens: 4096

# Messaging SPI — provider: redis (default), jms, servicebus, in-process
# JMS/Artemis: activate profile 'jms' (application-jms.yml)
# In-process (single JVM, Phase 1): activate profile 'inprocess' (application-inprocess.yml)
messaging:
  provider: redis
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    database: 3
    cache-database: 4
  agent-results:
    topic: agent-results
    subscription: orchestrator-group
  agent-events:
    topic: agent-events
    subscription: orchestrator-events-group

# Caching — provider: redis (default), simple
cache:
  provider: redis

# Worker Multi-Stack — profile registry for routing
worker-profiles:
  topic-per-type: false  # #21: when true, dispatches to agent-tasks:BE, agent-tasks:FE, etc.
