      SPRING_DATASOURCE_USERNAME: embeddings
      SPRING_DATASOURCE_PASSWORD: ${EMBEDDINGS_DB_PASSWORD}
      OLLAMA_BASE_URL: http://ollama:11434
      # Non richiede ANTHROPIC_API_KEY: worker programmatico (no LLM)
    mem_limit: 512m
    memswap_limit: 512m
    depends_on:
