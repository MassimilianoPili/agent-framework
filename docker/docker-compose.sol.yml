version: '3.8'

# SOL production deployment — Agent Framework
#
# Uses shared Docker infrastructure already running on the SOL server:
#   - redis (redis:7-alpine) on the 'shared' network  → DB 3 messaging, DB 4 cache, DB 5 RAG cache
#   - ollama (ollama/ollama:latest) on the 'shared' network → embedding + reranking models
#   - agentfw-postgres (sol/postgres:pg16-age) defined here, on the 'shared' network
#
# Required env file: docker/sol.env (not in VCS)
#   ANTHROPIC_API_KEY=claude_client   # client_id per proxy-ai (non API key standard)
#   DB_PASSWORD=...
#
# Start:   docker compose -f docker/docker-compose.sol.yml --env-file docker/sol.env up -d
# Stop:    docker compose -f docker/docker-compose.sol.yml down
# Logs:    docker compose -f docker/docker-compose.sol.yml logs -f orchestrator

# Shared skill volumes — mounted read-only in all workers.
# SkillLoader resolves files via agent.worker.skills-dir=/skills (set in application-redis.yml).
x-skills-volumes: &skills-volumes
  - /data/massimiliano/agent-framework/.claude:/skills/.claude:ro
  - /data/massimiliano/agent-framework/skills:/skills/skills:ro
  - /data/massimiliano/agent-framework/skills/patterns:/skills/patterns:ro

# Plan-scoped workspace — shared bind-mount for code generation and review (#44).
# Orchestrator: RW (WorkspaceManager creates/destroys subdirs per plan).
# Domain workers: RW (write generated code via MCP fs_write).
# Review worker: RO (read generated code via MCP fs_read).
# Path: /data/massimiliano/agent-framework/data/workspaces:/workspace

networks:
  shared:
    external: true   # Rete Docker condivisa del server SOL

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  agentfw-postgres:
    image: sol/postgres:pg16-age
    container_name: agentfw-postgres
    networks: [shared]
    environment:
      POSTGRES_DB: agentframework
      POSTGRES_USER: agentframework
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/massimiliano/agent-framework/data/postgres:/var/lib/postgresql/data
    mem_limit: 256m
    memswap_limit: 256m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentframework"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Control Plane ────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ../control-plane/orchestrator
      dockerfile: Dockerfile
    container_name: agentfw-orchestrator
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      DB_HOST: agentfw-postgres
      DB_USER: agentframework
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis       # container già in esecuzione su shared
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - /data/massimiliano/agent-framework/data/workspaces:/workspace:rw
    depends_on:
      agentfw-postgres:
        condition: service_healthy
    mem_limit: 768m
    memswap_limit: 768m
    restart: unless-stopped

  # ── Domain Workers ───────────────────────────────────────────────────────────
  be-java-worker:
    build:
      context: ../execution-plane/workers/be-java-worker
      dockerfile: Dockerfile
    container_name: agentfw-be-java-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
      AGENT_WORKER_SANDBOX_ENABLED: "true"
    volumes:
      - /data/massimiliano/agent-framework/.claude:/skills/.claude:ro
      - /data/massimiliano/agent-framework/skills:/skills/skills:ro
      - /data/massimiliano/agent-framework/skills/patterns:/skills/patterns:ro
      - /data/massimiliano/agent-framework/data/workspaces:/workspace:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
    mem_limit: 384m
    memswap_limit: 384m
    restart: unless-stopped

  fe-react-worker:
