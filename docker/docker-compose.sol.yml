version: '3.8'

# SOL production deployment — Agent Framework
#
# Uses shared Docker infrastructure already running on the SOL server:
#   - redis (redis:7-alpine) on the 'shared' network  → DB 3 messaging, DB 4 cache, DB 5 RAG cache
#   - ollama (ollama/ollama:latest) on the 'shared' network → embedding + reranking models
#   - agentfw-postgres (sol/postgres:pg16-age) defined here, on the 'shared' network
#
# Required env file: docker/sol.env (not in VCS)
#   ANTHROPIC_API_KEY=claude_client   # client_id per proxy-ai (non API key standard)
#   DB_PASSWORD=...
#
# Start:   docker compose -f docker/docker-compose.sol.yml --env-file docker/sol.env up -d
# Stop:    docker compose -f docker/docker-compose.sol.yml down
# Logs:    docker compose -f docker/docker-compose.sol.yml logs -f orchestrator

networks:
  shared:
    external: true   # Rete Docker condivisa del server SOL

services:

  # ── Database ─────────────────────────────────────────────────────────────────
  agentfw-postgres:
    image: sol/postgres:pg16-age
    container_name: agentfw-postgres
    networks: [shared]
    environment:
      POSTGRES_DB: agentframework
      POSTGRES_USER: agentframework
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /data/massimiliano/agent-framework/data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentframework"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Control Plane ────────────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ../control-plane/orchestrator
      dockerfile: Dockerfile
    container_name: agentfw-orchestrator
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      DB_HOST: agentfw-postgres
      DB_USER: agentframework
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis       # container già in esecuzione su shared
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      agentfw-postgres:
        condition: service_healthy
    restart: unless-stopped

  # ── Domain Workers ───────────────────────────────────────────────────────────
  be-java-worker:
    build:
      context: ../execution-plane/workers/be-java-worker
      dockerfile: Dockerfile
    container_name: agentfw-be-java-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
    restart: unless-stopped

  fe-react-worker:
    build:
      context: ../execution-plane/workers/fe-react-worker
      dockerfile: Dockerfile
    container_name: agentfw-fe-react-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
    restart: unless-stopped

  contract-worker:
    build:
      context: ../execution-plane/workers/contract-worker
      dockerfile: Dockerfile
    container_name: agentfw-contract-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
    restart: unless-stopped

  review-worker:
    build:
      context: ../execution-plane/workers/review-worker
      dockerfile: Dockerfile
    container_name: agentfw-review-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
    restart: unless-stopped

  # ── Middle-layer Workers ─────────────────────────────────────────────────────
  context-manager-worker:
    build:
      context: ../execution-plane/workers/context-manager-worker
      dockerfile: Dockerfile
    container_name: agentfw-context-manager-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
    restart: unless-stopped

  schema-manager-worker:
    build:
      context: ../execution-plane/workers/schema-manager-worker
      dockerfile: Dockerfile
    container_name: agentfw-schema-manager-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
    restart: unless-stopped

  # ── Mobile Workers ─────────────────────────────────────────────────────────
  mobile-kotlin-worker:
    build:
      context: ../execution-plane/workers/mobile-kotlin-worker
      dockerfile: Dockerfile
    container_name: agentfw-mobile-kotlin-worker
    networks: [shared]
    environment:
      SPRING_PROFILES_ACTIVE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SPRING_AI_ANTHROPIC_BASE_URL: http://proxy-ai:8097
    restart: unless-stopped

  # ── Ollama ─────────────────────────────────────────────────────────────────
  # Disabilitato: riusa l'istanza 'ollama' gia' attiva sulla rete shared.
  # L'orchestrator punta a http://ollama:11434 (DNS Docker, container esistente).
  # Se necessario un'istanza dedicata, decommentare il blocco sotto.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: agentfw-ollama
  #   networks: [shared]
  #   volumes:
  #     - /data/massimiliano/agent-framework/data/ollama:/root/.ollama
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 3G
  #   restart: unless-stopped
