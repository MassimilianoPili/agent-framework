# Azure Container Apps Job: ai-task-worker
apiVersion: "2023-05-01"
kind: ContainerAppsJob
metadata:
  name: ai-task-worker
  resourceGroup: rg-agent-framework-{env}
properties:
  configuration:
    triggerType: Event
    replicaTimeout: 1800
    replicaRetryLimit: 1
    eventTriggerConfig:
      scale:
        minExecutions: 0
        maxExecutions: 5
      rules:
        - name: servicebus-trigger
          type: azure-servicebus
          metadata:
            topicName: agent-tasks
            subscriptionName: ai-task-worker-sub
            messageCount: "1"
  template:
    containers:
      - name: ai-task-worker
        image: ghcr.io/agent-framework/ai-task-worker:{imageTag}
        resources:
          cpu: 1.0
          memory: 2Gi
        env:
          - name: AGENT_WORKER_TYPE
            value: AI_TASK
          - name: SPRING_PROFILES_ACTIVE
            value: "{env}"
