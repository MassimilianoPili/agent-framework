spring:
  application:
    name: advisory-worker
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 8192
          temperature: 0.1

agent:
  worker:
    task-topic: agent-advisory
    task-subscription: advisory-worker-sub
    results-topic: agent-results
    policy:
      enabled: true
      worker-profile:
      owns-paths: []
      # Advisory workers are read-only — no write tools in allowlist
      write-tool-names: []
      audit:
        enabled: true
        include-input: false
        max-input-length: 200

logging:
  level:
    com.agentframework: INFO
