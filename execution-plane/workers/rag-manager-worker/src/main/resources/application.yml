spring:
  application:
    name: rag-manager-worker
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 1024
          temperature: 0.0

agent:
  worker:
    task-topic: agent-tasks
    task-subscription: rag-manager-worker-sub
    results-topic: agent-results
    policy:
      enabled: true
      worker-profile: 
      owns-paths: []
      audit:
        enabled: true
        include-input: false
        max-input-length: 200

logging:
  level:
    com.agentframework: INFO
