# MCP Server Registry
# Defines available MCP servers, their transport, and the Maven Central packages
# that provide the tool implementations.
#
# Fields:
#   description       — Human-readable description of the server's capabilities
#   transport         — Default transport protocol: "sse" (remote, default) or "stdio" (child process)
#   package           — Maven Central artifact that provides the in-process tools
#   autoConfiguration — FQCN of the Spring Boot auto-configuration class for the package
#   enabled           — Whether this server is available for worker connections
#   connections       — Transport-specific connection details
#     sse.url         — HTTP endpoint for SSE transport (supports env var placeholders)
#     stdio.command   — Executable command for STDIO transport
#     stdio.args      — Command arguments for STDIO transport
#   notes             — Implementation details and requirements

servers:

  git:
    description: >
      Git operations — clone, checkout, commit, push, branch management,
      diff, log, and merge conflict resolution.
    transport: sse
    package: io.github.massimilianopili:mcp-devops-tools
    autoConfiguration: io.github.massimilianopili.mcp.devops.DevOpsToolsAutoConfiguration
    enabled: true
    connections:
      sse:
        url: http://mcp-server:8080
      stdio:
        command: java
        args: [-jar, /opt/mcp/mcp-server.jar, --spring.profiles.active=git]
    notes: >
      Part of the mcp-devops-tools multi-module artifact. Provides
      GitCloneTool, GitCommitTool, GitBranchTool, GitDiffTool, etc.
      Requires GITHUB_TOKEN or SSH key for remote operations.

  repo-fs:
    description: >
      Repository filesystem operations — read, write, edit, glob, grep
      scoped to the working repository. Enforces path ownership rules
      from config/repo-layout.yml.
    transport: sse
    package: io.github.massimilianopili:mcp-filesystem-tools
    autoConfiguration: io.github.massimilianopili.mcp.filesystem.FileSystemToolsAutoConfiguration
    enabled: true
    connections:
      sse:
        url: http://mcp-server:8080
      stdio:
        command: java
        args: [-jar, /opt/mcp/mcp-server.jar, --spring.profiles.active=repo-fs]
    notes: >
      Standalone artifact providing ReadFileTool, WriteFileTool,
      EditFileTool, GlobTool, GrepTool. All operations are sandboxed
      to the repository root directory. File size limits enforced
      via mcp/policies/sandbox/limits.yml.

  openapi:
    description: >
      OpenAPI contract tooling — Spectral lint, oasdiff breaking change
      detection, schema validation, and client/server codegen trigger.
    transport: sse
    package: io.github.massimilianopili:mcp-devops-tools
    autoConfiguration: io.github.massimilianopili.mcp.devops.DevOpsToolsAutoConfiguration
    enabled: true
    connections:
      sse:
        url: http://mcp-server:8080
      stdio:
        command: java
        args: [-jar, /opt/mcp/mcp-server.jar, --spring.profiles.active=openapi]
    notes: >
      Part of mcp-devops-tools. Provides SpectralLintTool,
      OasdiffBreakingTool, OpenApiValidateTool. Requires Node.js
      runtime for Spectral and oasdiff binary on PATH.

  azure:
    description: >
      Azure resource management — Service Bus topic/subscription
      operations, Container Apps job management, Key Vault secret
      reads (no writes), and resource group queries.
    transport: sse
    package: io.github.massimilianopili:mcp-devops-tools
    autoConfiguration: io.github.massimilianopili.mcp.devops.DevOpsToolsAutoConfiguration
    enabled: true
    connections:
      sse:
        url: http://mcp-server:8080
      stdio:
        command: java
        args: [-jar, /opt/mcp/mcp-server.jar, --spring.profiles.active=azure]
    notes: >
      Part of mcp-devops-tools. Uses Azure SDK DefaultAzureCredential.
      Write operations (create/delete) are restricted to non-production
      environments via policy. Requires AZURE_SUBSCRIPTION_ID.

  test:
    description: >
      Test execution and reporting — run Maven/Gradle tests, run npm
      test, collect coverage reports, parse JUnit XML results.
    transport: sse
    package: io.github.massimilianopili:mcp-devops-tools
    autoConfiguration: io.github.massimilianopili.mcp.devops.DevOpsToolsAutoConfiguration
    enabled: true
    connections:
      sse:
        url: http://mcp-server:8080
      stdio:
        command: java
        args: [-jar, /opt/mcp/mcp-server.jar, --spring.profiles.active=test]
    notes: >
      Part of mcp-devops-tools. Provides MavenTestTool, NpmTestTool,
      CoverageReportTool. Test execution is sandboxed; the tool
      cannot modify source files, only read test results.
